[pytest]
testpaths = tests
norecursedirs =
    tests/0.core
    tests/1.unit/authentication_tests
    tests/1.unit/providers_tests
python_files = test_*.py
asyncio_mode = auto
addopts = --tb=short --strict-markers
markers =
    asyncio: Async tests (pytest-asyncio)
    xwlogin_unit: Unit tests for xwlogin components
    xwlogin_core: Core architecture/import tests
    xwauth_identity_unit: Unit-layer tests for xwauth-identity
