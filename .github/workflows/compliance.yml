name: xwlogin Compliance

on:
  pull_request:
    paths:
      - "xwlogin/**"
      - "tools/ci/python_scripts/**"
  push:
    branches: ["main"]
    paths:
      - "xwlogin/**"
      - "tools/ci/python_scripts/**"

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r xwlogin/requirements.txt

      - name: Compliance checks (structure/docs/traceability/headers)
        run: |
          python xwlogin/tests/_tools/compliance_check.py

      - name: Format & type checks
        run: |
          black --check xwlogin/src xwlogin/tests
          isort --check-only xwlogin/src xwlogin/tests
          mypy xwlogin/src

      - name: Test suite
        run: |
          python -m pytest xwlogin/tests
