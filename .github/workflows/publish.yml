name: Dual PyPI Publish - exonware-xwauth-identity & xwlogin

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v0.0.2, v1.0.0, etc.
  workflow_dispatch:  # Allows manual trigger of the workflow

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Verify tag matches version.py
      run: |
        python .github/workflows/verify_tag_matches_version.py

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Set release date to today
      run: |
        python .github/workflows/update_release_date_from_version_file.py

    - name: Build exonware-xwauth-identity package
      run: |
        echo "Building exonware-xwauth-identity package..."
        python -m build

    - name: Build xwlogin package
      run: |
        echo "Building xwlogin package..."
        cp pyproject.toml pyproject.backup.toml
        cp pyproject.xwlogin.toml pyproject.toml
        python -m build
        mv pyproject.backup.toml pyproject.toml

    - name: List built packages
      run: |
        echo "Built packages:"
        find dist -name "*.whl" -o -name "*.tar.gz" | sort

    - name: Publish exonware-xwauth-identity to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        echo "Publishing exonware-xwauth-identity to PyPI..."
        ls -la dist/
        twine upload dist/exonware_xwlogin-*.whl dist/exonware_xwlogin-*.tar.gz

    - name: Publish xwlogin to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        echo "Publishing xwlogin to PyPI..."
        twine upload dist/xwlogin-*.whl dist/xwlogin-*.tar.gz

    - name: Success notification
      run: |
        echo "Successfully published both packages:"
        echo "   exonware-xwauth-identity v${{ github.ref_name }}"
        echo "   xwlogin v${{ github.ref_name }}"
        echo ""
        echo "PyPI URLs:"
        echo "   https://pypi.org/project/exonware-xwauth-identity/"
        echo "   https://pypi.org/project/xwauth.identity/"
        echo ""
